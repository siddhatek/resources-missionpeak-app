<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eafaf6"/>
      <stop offset="100%" stop-color="#cdf2e9"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky2)"/>
  <circle cx="280" cy="190" r="95" fill="#f59e0b" opacity="0.85"/>
  <circle cx="280" cy="190" r="135" fill="#f59e0b" opacity="0.12"/>

  <path d="M0,620 Q400,540 800,600 T1600,560 V900 H0 Z" fill="#5addcd" opacity="0.5"/>
  <path d="M0,900 V700 Q400,630 800,690 T1600,660 V900 Z" fill="#16c8b5"/>

  <!-- tree -->
  <g transform="translate(1180,470)">
    <rect x="-10" y="60" width="20" height="120" fill="#0f877a"/>
    <circle cx="0" cy="20" r="90" fill="#14b8a6"/>
    <circle cx="-60" cy="60" r="60" fill="#16c8b5"/>
    <circle cx="60" cy="60" r="60" fill="#16c8b5"/>
  </g>

  <!-- calm seated figure -->
  <g transform="translate(560,640)">
    <circle cx="0" cy="-90" r="20" fill="#4b5563"/>
    <path d="M-40,-10 Q0,-70 40,-10 L30,30 Q0,50 -30,30 Z" fill="#14b8a6"/>
    <path d="M-40,-10 Q-60,30 -30,40" fill="none" stroke="#4b5563" stroke-width="8" stroke-linecap="round"/>
    <path d="M40,-10 Q60,30 30,40" fill="none" stroke="#4b5563" stroke-width="8" stroke-linecap="round"/>
    <ellipse cx="0" cy="48" rx="60" ry="14" fill="#0f877a" opacity="0.4"/>
  </g>

  <!-- gentle rising motion lines -->
  <g stroke="#0f877a" stroke-width="6" stroke-linecap="round" opacity="0.5">
    <path d="M460,560 Q480,500 460,440" fill="none"/>
    <path d="M520,560 Q545,490 520,420" fill="none"/>
    <path d="M580,560 Q605,500 580,440" fill="none"/>
  </g>

  <!-- floating leaf accents -->
  <g fill="#f59e0b" opacity="0.7">
    <ellipse cx="900" cy="260" rx="16" ry="9" transform="rotate(30 900 260)"/>
    <ellipse cx="950" cy="330" rx="14" ry="8" transform="rotate(-20 950 330)"/>
  </g>
</svg>
